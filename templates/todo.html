<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>To-Do</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 480px; }
        h1 { font-size: 24px; color: #1a1a2e; margin-bottom: 24px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #333; margin-bottom: 6px; }
        input, textarea { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; margin-bottom: 18px; }
        button { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
        button:hover { background: #4338ca; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Add To-Do Item</h1>
        <form method="POST" action="/submittodoitem">
            <label>Item Name</label>
            <input type="text" name="itemName" placeholder="Enter item name" />

            <label>Item Description</label>
            <textarea name="itemDescription" placeholder="Enter description"></textarea>
           
           <label>Item ID</label>
           <input type="text" name="itemId" placeholder="Enter item ID" /> 
                                                                          
            <label>Item UUID</label>
            <input type="text" name="itemUuid" placeholder="Enter item UUID" />
            
            <label>Item Hash</label>
            <input type="text" name="itemHash" placeholder="Enter item hash" /> 
    
                   
            <label>Item Hash</label>
            <input type="text" name="itemHash" placeholder="Enter item hash" /> 
    
            <button type="submit">Add Item</button>
        </form>
    </div>
</body>
</html>
